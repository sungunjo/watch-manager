name: CI - Pull Request Validation

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'app/**'
      - '*.ts'
      - '*.tsx'
      - '*.json'
      - 'package.json'
      - 'tsconfig.json'
      - '.github/workflows/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Test & Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx expo lint

      - name: Unit tests
        run: npx jest --ci --coverage

      - name: Expo export check
        run: npx expo export --platform web
        env:
          NODE_ENV: production

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: coverage/
          retention-days: 7
