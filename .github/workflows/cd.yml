name: CD - Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build Android & Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Extract version from app.json
        id: version
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          VERSION_CODE=$(node -p "require('./app.json').expo.android.versionCode")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION (build $VERSION_CODE)"

      - name: Check if release tag already exists
        id: check_tag
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git tag -l "$TAG" | grep -q "$TAG"; then
            TAG="v${{ steps.version.outputs.version }}-build.${{ steps.version.outputs.version_code }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Release tag: $TAG"

      - name: Build Android APK with EAS
        run: eas build --platform android --profile production --non-interactive --wait

      - name: Download build artifact
        run: |
          BUILD_URL=$(eas build:list --platform android --status finished --limit 1 --json --non-interactive | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'))[0].artifacts.buildUrl")
          curl -L -o watch-manager-v${{ steps.version.outputs.version }}.apk "$BUILD_URL"
          echo "Downloaded APK from: $BUILD_URL"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.check_tag.outputs.tag }}
          name: Watch Manager v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: watch-manager-v${{ steps.version.outputs.version }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
