name: CD - Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build Android & Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Verify EAS authentication
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "::error::EXPO_TOKEN secret is not set. Please add it in GitHub repo Settings > Secrets and variables > Actions."
            exit 1
          fi
          eas whoami
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Extract version from app.json
        id: version
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          VERSION_CODE=$(node -p "require('./app.json').expo.android.versionCode || 1")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION (versionCode: $VERSION_CODE)"

      - name: Determine release tag
        id: tag
        run: |
          BASE_TAG="v${{ steps.version.outputs.version }}"
          if git tag -l "$BASE_TAG" | grep -q "$BASE_TAG"; then
            TAG="${BASE_TAG}-build.${{ steps.version.outputs.version_code }}"
          else
            TAG="$BASE_TAG"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Release tag: $TAG"

      - name: Build Android APK with EAS
        id: eas_build
        run: |
          BUILD_JSON=$(eas build \
            --platform android \
            --profile production \
            --non-interactive \
            --wait \
            --json \
            2>/dev/null)
          echo "EAS build output received"
          BUILD_URL=$(echo "$BUILD_JSON" | python3 -c "
          import sys, json
          text = sys.stdin.read().strip()
          for line in reversed(text.split('\n')):
              line = line.strip()
              if not line:
                  continue
              try:
                  data = json.loads(line)
                  if isinstance(data, list):
                      data = data[0]
                  artifacts = data.get('artifacts') or {}
                  url = artifacts.get('applicationArchiveUrl') or artifacts.get('buildUrl') or ''
                  if url:
                      print(url)
                      break
              except Exception:
                  pass
          " 2>/dev/null || echo "")
          if [ -z "$BUILD_URL" ]; then
            echo "::error::Failed to extract APK download URL from EAS build output."
            echo "EAS build output: $BUILD_JSON"
            exit 1
          fi
          echo "build_url=$BUILD_URL" >> $GITHUB_OUTPUT
          echo "Build URL: $BUILD_URL"

      - name: Download APK artifact
        run: |
          APK_NAME="watch-manager-v${{ steps.version.outputs.version }}.apk"
          curl -L -f -o "$APK_NAME" "${{ steps.eas_build.outputs.build_url }}"
          echo "Downloaded: $APK_NAME ($(du -sh $APK_NAME | cut -f1))"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Watch Manager v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: watch-manager-v${{ steps.version.outputs.version }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
